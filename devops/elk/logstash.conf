# Logstash pipeline — used by docker-compose
# Listens on 5044 (Beats), parses JSON app logs, indexes to Elasticsearch.

input {
  beats {
    port => 5044
    codec => json
  }
}

filter {
  # Parse JSON body emitted by the Node.js Logger (LOG_FORMAT=json)
  if [message] =~ /^\{/ {
    json {
      source  => "message"
      target  => "app"
      remove_field => ["message"]
    }

    mutate {
      rename => {
        "[app][level]"     => "log_level"
        "[app][service]"   => "service_name"
        "[app][context]"   => "log_context"
        "[app][message]"   => "log_message"
        "[app][timestamp]" => "app_timestamp"
      }
    }
  }

  # Parse ISO timestamp into @timestamp
  if [app_timestamp] {
    date {
      match  => ["app_timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["app_timestamp"]
    }
  }

  # Tag error-level logs for easy filtering in Kibana
  if [log_level] == "ERROR" {
    mutate { add_tag => ["error"] }
  }

  # Drop health-check noise from nginx/k8s probes
  if [log_message] =~ "health" or [request] =~ "/api/health" {
    drop {}
  }
}

output {
  elasticsearch {
    hosts  => ["http://elasticsearch:9200"]
    index  => "codeview-logs-%{+YYYY.MM.dd}"
    action => "index"
  }
}
