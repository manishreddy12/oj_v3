apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: logging
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.enabled: false

  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }

    filter {
      # Parse JSON logs emitted by the Node.js services (LOG_FORMAT=json)
      if [message] =~ /^\{/ {
        json {
          source => "message"
          target => "app"
        }
        mutate {
          add_field => {
            "log_level" => "%{[app][level]}"
            "service"   => "%{[app][service]}"
            "context"   => "%{[app][context]}"
          }
        }
      }

      # Drop noisy health-check hits
      if [request] =~ "/api/health" {
        drop {}
      }

      # Parse timestamps
      date {
        match => ["[app][timestamp]", "ISO8601"]
        target => "@timestamp"
      }

      # Geo-IP on remote_ip if present
      if [remote_ip] {
        geoip {
          source => "remote_ip"
        }
      }
    }

    output {
      elasticsearch {
        hosts    => ["http://elasticsearch:9200"]
        index    => "codeview-logs-%{+YYYY.MM.dd}"
        action   => "index"
      }
      # Uncomment for debugging
      # stdout { codec => rubydebug }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: logging
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.13.4
          ports:
            - containerPort: 5044
              name: beats
            - containerPort: 9600
              name: monitoring
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu:    "200m"
              memory: "512Mi"
            limits:
              cpu:    "500m"
              memory: "1Gi"
          volumeMounts:
            - name: logstash-config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
            - name: logstash-config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          readinessProbe:
            httpGet:
              path: /
              port: 9600
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: logstash-config
          configMap:
            name: logstash-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: logging
  labels:
    app: logstash
spec:
  type: ClusterIP
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
