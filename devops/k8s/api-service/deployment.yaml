apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: codeview
  labels:
    app: api-service
    tier: backend
spec:
  replicas: 2                        # HPA will override this
  selector:
    matchLabels:
      app: api-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0              # zero-downtime deploys
  template:
    metadata:
      labels:
        app: api-service
        tier: backend
      annotations:
        # Forces pod restart when configmap/secret changes via Ansible/Jenkins
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/api/health"
    spec:
      # Spread pods across nodes when available
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: api-service

      containers:
        - name: api-service
          image: YOUR_DOCKERHUB_USERNAME/codeview-api:latest  # replaced by Jenkins
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http

          envFrom:
            - configMapRef:
                name: api-service-config
            - secretRef:
                name: api-service-secret

          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"

          # Readiness — don't route traffic until the app is ready
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # Liveness — restart the container if it stops responding
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          # Startup — give extra time on cold start (Mongo connection)
          startupProbe:
            httpGet:
              path: /api/health
              port: 5000
            failureThreshold: 12
            periodSeconds: 5

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
