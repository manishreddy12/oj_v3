apiVersion: v1
kind: ConfigMap
metadata:
  name: api-service-config
  namespace: codeview
data:
  NODE_ENV:               "production"
  PORT:                   "5000"
  JWT_EXPIRY:             "1d"
  CACHE_ENABLED:          "true"
  # Points to the execution-service K8s Service DNS name
  EXECUTION_SERVICE_URL:  "http://execution-service:5001"
  # Replace with your actual frontend URL once deployed
  FRONTEND_URL:           "http://localhost"
  LOG_FORMAT:             "json"
  SERVICE_NAME:           "api-service"
