apiVersion: apps/v1
kind: Deployment
metadata:
  name: execution-service
  namespace: codeview
  labels:
    app: execution-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: execution-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: execution-service
        tier: backend
    spec:
      # Spread across nodes
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: execution-service

      containers:
        - name: execution-service
          image: YOUR_DOCKERHUB_USERNAME/codeview-execution:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
              name: http

          envFrom:
            - configMapRef:
                name: execution-service-config
            - secretRef:
                name: execution-service-secret

          resources:
            # Code compilation is CPU-intensive — give it more headroom
            requests:
              cpu:    "200m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"     # 1 full core per pod max
              memory: "768Mi"

          # Execution jobs take longer to start — longer initial delay
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/health
              port: 5001
            failureThreshold: 15
            periodSeconds: 5

          # Temp directory for compiler output
          volumeMounts:
            - name: exec-tmp
              mountPath: /tmp/executions

      volumes:
        - name: exec-tmp
          emptyDir:
            medium: Memory          # in-memory for performance; cap with sizeLimit
            sizeLimit: 128Mi

      restartPolicy: Always
      terminationGracePeriodSeconds: 30
