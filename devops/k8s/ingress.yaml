# Requires an Ingress controller. On Minikube:
#   minikube addons enable ingress
#   Then add to /etc/hosts:  $(minikube ip) codeview.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: codeview-ingress
  namespace: codeview
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Rate limit: 100 req/s per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  rules:
    - host: codeview.local       # change to your domain in production
      http:
        paths:
          # API traffic → api-service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 5000
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
