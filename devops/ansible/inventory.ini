# Ansible inventory
# For a single Ubuntu machine (where K8s / Minikube is running),
# localhost via SSH or local connection works fine.

[local]
localhost ansible_connection=local

[k8s_nodes]
# Add remote nodes here if you scale to a multi-node cluster later.
# k8s-worker1 ansible_host=192.168.1.101 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[all:vars]
ansible_python_interpreter=/usr/bin/python3
